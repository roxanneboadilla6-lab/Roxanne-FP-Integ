<body>

  <div class="container pt-5 mt-5">
    <h2 class="text-center display-6 fw-bold text-success mb-5">Contact Us</h2>

    <div class="row g-5">
      <div class="col-md-6">
        <div class="card shadow border-0 rounded-3 p-4">
          <h4 class="mb-4 fw-bold">Send us a Message</h4>
          
          <form action="#" method="POST">
            <div class="mb-3">
              <label for="name" class="form-label fw-semibold">Full Name</label>
              <input type="text" class="form-control" id="name" name="name" required placeholder="Name">
            </div>

          
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Email Address</label>
              <input type="email" class="form-control" id="email" name="email" required placeholder="Email Address">
            </div>

         
            <div class="mb-4">
              <label for="message" class="form-label fw-semibold">Message</label>
              <textarea class="form-control" id="message" name="message" rows="5" required placeholder="Message"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">Send Message</button>
          </form>
        </div>
      </div>

    
      <div class="col-md-6">
      
        <div class="card shadow border-0 rounded-3 mb-4">
          <div class="card-body p-0">
            <iframe 
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6130.823476444444!2d120.36475631544158!3d16.33333238873231!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3391a155f625f771%3A0x5f5f5f5f5f5f5f5f!2sAgoo%2C%20La%20Union!5e0!3m2!1sen!2sph!4v1620000000000!5m2!1sen!2sph" 
              width="100%" 
              height="300" 
              style="border:0; border-radius: 0.375rem;" 
              allowfullscreen="" 
              loading="lazy" 
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>

     
        <div class="card shadow border-0 rounded-3 p-4">
          <h5 class="fw-bold mb-3">Get in Touch</h5>
          
          <p class="mb-4"><i class="bi bi-geo-alt-fill text-primary me-2"></i> Agoo, La Union, Philippines</p>

      
          <h6 class="fw-semibold mb-3">Follow Us</h6>
          <div class="d-flex gap-3">
            <a href="https://facebook.com" target="_blank" class="btn btn-outline-primary rounded-circle p-2">
              <i class="bi bi-facebook fs-5"></i>
            </a>
            <a href="https://instagram.com" target="_blank" class="btn btn-outline-danger rounded-circle p-2">
              <i class="bi bi-instagram fs-5"></i>
            </a>
            <a href="https://twitter.com" target="_blank" class="btn btn-outline-info rounded-circle p-2">
              <i class="bi bi-twitter fs-5"></i>
            </a>
            <a href="https://youtube.com" target="_blank" class="btn btn-outline-danger rounded-circle p-2">
              <i class="bi bi-youtube fs-5"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
